<div class="container" style="margin-top: 50px;">
  <div class="row">
    <div class="col s12 m10 offset-m1 l8 offset-l2">
      <div class="card z-depth-3">
        <div class="card-image waves-effect waves-block waves-light" style="height: 180px; background-color: #e0f2f7;">
          <i class="material-icons large teal-text text-darken-2 center" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">account_circle</i>
        </div>
        <div class="card-content">
          <span class="card-title activator grey-text text-darken-4 center-align" style="font-weight: 500;">
            Édition du Profil
            <i class="material-icons right">edit</i>
          </span>

          <div *ngIf="isLoading" class="center-align" style="padding: 20px;">
            <div class="preloader-wrapper big active">
              <div class="spinner-layer spinner-teal-only">
                <div class="circle-clipper left">
                  <div class="circle"></div>
                </div>
                <div class="gap-patch">
                  <div class="circle"></div>
                </div>
                <div class="circle-clipper right">
                  <div class="circle"></div>
                </div>
              </div>
            </div>
            <p>Chargement des informations...</p>
          </div>

          <div *ngIf="error" class="card-panel red lighten-1 white-text center-align">
            <i class="material-icons left">error_outline</i>{{ error }}
          </div>

          <form *ngIf="!isLoading && !error" [formGroup]="professeurForm" (ngSubmit)="onSubmit()" style="margin-top: 20px;">
            <div class="row">
              <div class="input-field col s12 m6">
                <i class="material-icons prefix">school</i>
                <input id="specialite" type="text" formControlName="specialiteProfesseur" class="validate">
                <label for="specialite">Spécialité</label>
                <div *ngIf="professeurForm.get('specialiteProfesseur')?.invalid && professeurForm.get('specialiteProfesseur')?.touched" class="red-text">
                  <span>La spécialité est requise.</span>
                </div>
              </div>
              <div class="input-field col s12 m6">
                <i class="material-icons prefix">power_settings_new</i>
                <select id="statut" formControlName="statutProfesseur" class="browser-default">
                  <option value="ACTIF">Actif</option>
                  <option value="INACTIF">Inactif</option>
                  <option value="EN_CONGE">En congé</option>
                </select>
                <label for="statut" class="active" style="position: relative; top: -14px;">Statut</label>
              </div>
            </div>

            <div class="row">
              <div class="input-field col s12">
                <i class="material-icons prefix">description</i>
                <textarea id="biographie" formControlName="biographieProfesseur" class="materialize-textarea"></textarea>
                <label for="biographie">Biographie</label>
              </div>
            </div>

            <div class="row">
              <div class="col s12 right-align" style="margin-top: 30px;">
                <button type="button" (click)="onCancel()" class="btn waves-effect waves-light grey darken-1">
                  <i class="material-icons left">cancel</i>Annuler
                </button>
                <button type="submit" [disabled]="professeurForm.invalid" class="btn waves-effect waves-light teal darken-2" style="margin-left: 10px;">
                  <i class="material-icons left">save</i>Enregistrer
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  .card .card-image i.center {
    font-size: 6em; /* Ajustez la taille de l'icône */
    color: rgba(0, 150, 136, 0.7); /* Couleur légèrement transparente */
  }
</style>
