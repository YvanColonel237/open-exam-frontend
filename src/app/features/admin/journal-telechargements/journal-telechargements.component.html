<div class="container" style="margin-top: 50px;">
  <div class="row">
    <div class="col s12">
      <div class="card-panel teal lighten-2 center-align z-depth-2">
        <h5 class="white-text" style="font-weight: 300;">Mon Historique de Téléchargements</h5>
      </div>
    </div>
  </div>

  <div class="row" *ngIf="isLoading">
    <div class="col s12 center-align">
      <div class="preloader-wrapper big active">
        <div class="spinner-layer spinner-blue-only">
          <div class="circle-clipper left">
            <div class="circle"></div>
          </div>
          <div class="gap-patch">
            <div class="circle"></div>
          </div>
          <div class="circle-clipper right">
            <div class="circle"></div>
          </div>
        </div>
      </div>
      <p class="flow-text grey-text">Chargement de l'historique...</p>
    </div>
  </div>

  <div class="row" *ngIf="!isLoading && !error && telechargements.length > 0">
    <div class="col s12">
      <table class="striped responsive-table z-depth-1">
        <thead>
        <tr>
          <th>ID</th>
          <th>Code de l'Épreuve</th>
          <th>Libellé de l'Épreuve</th>
          <th>Date</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let item of telechargements">
          <td>{{ item.idJournal }}</td>
          <td>{{ item.codeEpreuve }}</td>
          <td>{{ item.libelleEpreuve }}</td>
          <td>{{ item.dateTelechargement | date: 'dd/MM/yyyy HH:mm' }}</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="row" *ngIf="!isLoading && !error && telechargements.length === 0">
    <div class="col s12 center-align">
      <div class="card-panel grey lighten-3">
        <span class="grey-text">Aucun téléchargement trouvé.</span>
      </div>
    </div>
  </div>
</div>
